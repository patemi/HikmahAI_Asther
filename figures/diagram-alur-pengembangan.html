<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Diagram Alur Pengembangan Sistem HikmahAI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Times New Roman', Times, serif;
    background: #ffffff;
    padding: 30px;
    display: flex;
    justify-content: center;
  }
  .figure { max-width: 900px; width: 100%; }
  .caption {
    text-align: center;
    margin-top: 16px;
    font-size: 14px;
    font-weight: bold;
    color: #1a1a1a;
  }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
  <div class="figure">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1230" width="100%">
      <defs>
        <linearGradient id="processGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#10b981"/>
          <stop offset="100%" stop-color="#047857"/>
        </linearGradient>
        <linearGradient id="terminalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#1e3a8a"/>
        </linearGradient>
        <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>

        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
          <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.18"/>
        </filter>

        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/>
        </marker>
        <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
        </marker>
      </defs>

      <rect x="0" y="0" width="800" height="1230" fill="#fafaf9"/>

      <!-- ============ MULAI ============ -->
      <g filter="url(#shadow)">
        <ellipse cx="380" cy="50" rx="85" ry="26"
                 fill="url(#terminalGrad)" stroke="#1e3a8a" stroke-width="1.5"/>
        <text x="380" y="57" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="16" font-weight="bold">MULAI</text>
      </g>

      <!-- ============ PROCESS 1: Pengumpulan Dataset ============ -->
      <g filter="url(#shadow)">
        <rect x="180" y="105" width="400" height="68" rx="6" ry="6"
              fill="url(#processGrad)" stroke="#065f46" stroke-width="1.5"/>
        <text x="380" y="130" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Pengumpulan Dataset Keislaman
        </text>
        <text x="380" y="151" text-anchor="middle" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          Scraping Al-Qur'an dari Kementerian Agama
        </text>
        <text x="380" y="166" text-anchor="middle" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          + Database Hadist dari GitHub
        </text>
      </g>

      <!-- ============ PROCESS 2: Konversi JSON ============ -->
      <g filter="url(#shadow)">
        <rect x="180" y="200" width="400" height="55" rx="6" ry="6"
              fill="url(#processGrad)" stroke="#065f46" stroke-width="1.5"/>
        <text x="380" y="225" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Konversi Dataset ke Format JSON
        </text>
        <text x="380" y="244" text-anchor="middle" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          (Knowledge Base untuk RAG)
        </text>
      </g>

      <!-- ============ PROCESS 3: Analisis Kebutuhan ============ -->
      <g filter="url(#shadow)">
        <rect x="180" y="282" width="400" height="68" rx="6" ry="6"
              fill="url(#processGrad)" stroke="#065f46" stroke-width="1.5"/>
        <text x="380" y="307" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Analisis Kebutuhan
        </text>
        <text x="380" y="328" text-anchor="middle" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          Identifikasi kebutuhan Fungsional &amp; Non-Fungsional
        </text>
        <text x="380" y="343" text-anchor="middle" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          (Auth, Chat API, RAG, Dashboard, Evaluasi)
        </text>
      </g>

      <!-- ============ PROCESS 4: Perancangan ============ -->
      <g filter="url(#shadow)">
        <rect x="180" y="377" width="400" height="68" rx="6" ry="6"
              fill="url(#processGrad)" stroke="#065f46" stroke-width="1.5"/>
        <text x="380" y="402" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Perancangan Sistem
        </text>
        <text x="380" y="423" text-anchor="middle" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          Use Case Diagram &amp; Activity Diagram
        </text>
        <text x="380" y="438" text-anchor="middle" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          untuk merancang alur sistem
        </text>
      </g>

      <!-- ============ PROCESS 5: Implementasi ============ -->
      <g filter="url(#shadow)">
        <rect x="160" y="472" width="440" height="92" rx="6" ry="6"
              fill="url(#processGrad)" stroke="#065f46" stroke-width="1.5"/>
        <text x="380" y="494" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Implementasi Sistem (Pemrograman)
        </text>
        <text x="220" y="514" text-anchor="start" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          • Setup Knowledge Base &amp; Vector Embedding
        </text>
        <text x="220" y="529" text-anchor="start" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          • Implementasi Backend (API Routes &amp; RAG)
        </text>
        <text x="220" y="544" text-anchor="start" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          • Implementasi Frontend (UI/UX Responsif)
        </text>
        <text x="220" y="559" text-anchor="start" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          • Implementasi Fitur Inti &amp; Integrasi
        </text>
      </g>

      <!-- ============ PROCESS 6: Pengujian ============ -->
      <g filter="url(#shadow)">
        <rect x="180" y="591" width="400" height="68" rx="6" ry="6"
              fill="url(#processGrad)" stroke="#065f46" stroke-width="1.5"/>
        <text x="380" y="616" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Pengujian Sistem
        </text>
        <text x="380" y="637" text-anchor="middle" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          Evaluation Metrics (accuracy, precision, recall, F1)
        </text>
        <text x="380" y="652" text-anchor="middle" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          + Pengujian Ahli (expert review)
        </text>
      </g>

      <!-- ============ DECISION: Lulus Uji? ============ -->
      <g filter="url(#shadow)">
        <polygon points="380,690 520,755 380,820 240,755"
                 fill="url(#decisionGrad)" stroke="#92400e" stroke-width="1.5"/>
        <text x="380" y="750" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Sistem
        </text>
        <text x="380" y="768" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Lulus Uji?
        </text>
      </g>

      <!-- ============ PROCESS 7: Containerization Docker ============ -->
      <g filter="url(#shadow)">
        <rect x="180" y="855" width="400" height="55" rx="6" ry="6"
              fill="url(#processGrad)" stroke="#065f46" stroke-width="1.5"/>
        <text x="380" y="880" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Containerization dengan Docker
        </text>
        <text x="380" y="899" text-anchor="middle" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          (Docker + Docker Compose)
        </text>
      </g>

      <!-- ============ PROCESS 8: Deployment ============ -->
      <g filter="url(#shadow)">
        <rect x="180" y="940" width="400" height="50" rx="6" ry="6"
              fill="url(#processGrad)" stroke="#065f46" stroke-width="1.5"/>
        <text x="380" y="970" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Deployment Sistem
        </text>
      </g>

      <!-- ============ PROCESS 9: Pemeliharaan ============ -->
      <g filter="url(#shadow)">
        <rect x="180" y="1020" width="400" height="68" rx="6" ry="6"
              fill="url(#processGrad)" stroke="#065f46" stroke-width="1.5"/>
        <text x="380" y="1045" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Pemeliharaan &amp; Pengembangan
        </text>
        <text x="380" y="1063" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          Berkelanjutan
        </text>
        <text x="380" y="1082" text-anchor="middle" fill="#d1fae5"
              font-family="Arial, sans-serif" font-size="11">
          (penilaian kualitas, personalisasi, mobile)
        </text>
      </g>

      <!-- ============ SELESAI ============ -->
      <g filter="url(#shadow)">
        <ellipse cx="380" cy="1140" rx="85" ry="26"
                 fill="url(#terminalGrad)" stroke="#1e3a8a" stroke-width="1.5"/>
        <text x="380" y="1147" text-anchor="middle" fill="#ffffff"
              font-family="Arial, sans-serif" font-size="16" font-weight="bold">SELESAI</text>
      </g>

      <!-- ============ ARROWS (forward flow) ============ -->
      <line x1="380" y1="76"   x2="380" y2="103"  stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="380" y1="173"  x2="380" y2="198"  stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="380" y1="255"  x2="380" y2="280"  stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="380" y1="350"  x2="380" y2="375"  stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="380" y1="445"  x2="380" y2="470"  stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="380" y1="564"  x2="380" y2="589"  stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="380" y1="659"  x2="380" y2="688"  stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="380" y1="820"  x2="380" y2="853"  stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="380" y1="910"  x2="380" y2="938"  stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="380" y1="990"  x2="380" y2="1018" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="380" y1="1088" x2="380" y2="1113" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>

      <!-- Decision YES label -->
      <text x="395" y="838" fill="#047857"
            font-family="Arial, sans-serif" font-size="13" font-weight="bold">Ya</text>

      <!-- Decision NO label and loopback to Implementasi -->
      <text x="535" y="752" fill="#dc2626"
            font-family="Arial, sans-serif" font-size="13" font-weight="bold">Tidak</text>

      <!-- Loopback path: from right of diamond → up → into Implementasi -->
      <path d="M 520 755 L 700 755 L 700 518 L 603 518"
            fill="none" stroke="#dc2626" stroke-width="2"
            stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>

      <!-- Title -->
      <text x="380" y="20" text-anchor="middle" fill="#1a1a1a"
            font-family="Arial, sans-serif" font-size="16" font-weight="bold">
        Alur Pengembangan Sistem HikmahAI
      </text>

      <!-- ============ Phase markers on left side (decorative bracket) ============ -->
      <!-- Phase 1: Analisis Kebutuhan (steps 1-3, y=105 to y=350) -->
      <line x1="120" y1="110" x2="120" y2="345" stroke="#94a3b8" stroke-width="2"/>
      <line x1="120" y1="110" x2="135" y2="110" stroke="#94a3b8" stroke-width="2"/>
      <line x1="120" y1="345" x2="135" y2="345" stroke="#94a3b8" stroke-width="2"/>
      <text x="115" y="232" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="11" font-weight="bold">Fase 1</text>
      <text x="115" y="246" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="10">Analisis</text>
      <text x="115" y="259" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="10">Kebutuhan</text>

      <!-- Phase 2: Perancangan (step 4) -->
      <line x1="120" y1="380" x2="120" y2="445" stroke="#94a3b8" stroke-width="2"/>
      <line x1="120" y1="380" x2="135" y2="380" stroke="#94a3b8" stroke-width="2"/>
      <line x1="120" y1="445" x2="135" y2="445" stroke="#94a3b8" stroke-width="2"/>
      <text x="115" y="408" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="11" font-weight="bold">Fase 2</text>
      <text x="115" y="422" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="10">Perancangan</text>

      <!-- Phase 3: Pemrograman (step 5) -->
      <line x1="120" y1="475" x2="120" y2="565" stroke="#94a3b8" stroke-width="2"/>
      <line x1="120" y1="475" x2="135" y2="475" stroke="#94a3b8" stroke-width="2"/>
      <line x1="120" y1="565" x2="135" y2="565" stroke="#94a3b8" stroke-width="2"/>
      <text x="115" y="513" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="11" font-weight="bold">Fase 3</text>
      <text x="115" y="527" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="10">Pemrograman</text>

      <!-- Phase 4: Pengujian (step 6 + decision) -->
      <line x1="120" y1="591" x2="120" y2="820" stroke="#94a3b8" stroke-width="2"/>
      <line x1="120" y1="591" x2="135" y2="591" stroke="#94a3b8" stroke-width="2"/>
      <line x1="120" y1="820" x2="135" y2="820" stroke="#94a3b8" stroke-width="2"/>
      <text x="115" y="700" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="11" font-weight="bold">Fase 4</text>
      <text x="115" y="714" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="10">Pengujian</text>

      <!-- Phase 5: Pemeliharaan (steps 7-9) -->
      <line x1="120" y1="855" x2="120" y2="1088" stroke="#94a3b8" stroke-width="2"/>
      <line x1="120" y1="855" x2="135" y2="855" stroke="#94a3b8" stroke-width="2"/>
      <line x1="120" y1="1088" x2="135" y2="1088" stroke="#94a3b8" stroke-width="2"/>
      <text x="115" y="965" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="11" font-weight="bold">Fase 5</text>
      <text x="115" y="979" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="10">Pengelolaan &amp;</text>
      <text x="115" y="992" text-anchor="end" fill="#475569"
            font-family="Arial, sans-serif" font-size="10">Pemeliharaan</text>

      <!-- ============ Legend ============ -->
      <g transform="translate(630, 1080)">
        <rect x="0" y="0" width="14" height="14" fill="url(#terminalGrad)" stroke="#1e3a8a"/>
        <text x="20" y="11" font-family="Arial, sans-serif" font-size="10" fill="#334155">Terminator</text>
        <rect x="0" y="22" width="14" height="14" fill="url(#processGrad)" stroke="#065f46"/>
        <text x="20" y="33" font-family="Arial, sans-serif" font-size="10" fill="#334155">Process</text>
        <polygon points="7,46 14,53 7,60 0,53" fill="url(#decisionGrad)" stroke="#92400e"/>
        <text x="20" y="55" font-family="Arial, sans-serif" font-size="10" fill="#334155">Decision</text>
        <line x1="0" y1="74" x2="14" y2="74" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
        <text x="20" y="78" font-family="Arial, sans-serif" font-size="10" fill="#334155">Iterasi</text>
      </g>
    </svg>
    <div class="caption">Gambar 1. Diagram Alur Pengembangan Sistem HikmahAI</div>
  </div>
</body>
</html>
